<!DOCTYPE html>
<html>
<head>
    <title>My Simple Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: lightblue;
            margin: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            color: darkblue;
        }

        p {
            color: #333;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: blue;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This is a simple HTML and CSS webpage.</p>
        <a href="#" class="btn">Click Me</a>
    </div>
</body>
</html>
