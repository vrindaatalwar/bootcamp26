<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <link rel="stylesheet" href="../src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="bg-gray-200 flex items-center justify-center">

    <form action="" method="post" class="bg-white place-content-center pl-10 m-10 pr-10 rounded-2xl ">
        <h1 class="text-slate-700 text-3xl grid font-bold place-content-center mt-2">Student's Registaration</h1>
        <p class="grid font-semibold place-content-center text-sm mt-2">Please fill in your details to create an account.</p>
        <hr>
        <div class="text-lg">
                <div class="p-0.2 mt-4">
            <b>First Name :</b>
            <input type="text" name="firstname" class="border ml-3.5" id="username" placeholder="Dean Ambrose">
            <br><br>
        </div>
        <div class="p-0.2 m-1">
            <b>Email :</b>
            <input type="email" name="email" class="border ml-13.5" id="mail" placeholder="deanam@gmail.com">
            <br><br>
        </div>
        
        <div class="p-0.2 m-1">
            <b>D.O.B :</b>
            <input type="date" name="dob" class="border ml-13" id="dob">
            <br><br>
                    
        </div>
        <div class="p-0.2 m-1">
            <b>Mob No :</b>
            <input type="number" name="contact" class="border ml-7" placeholder="91 + 8684XXXXXX" id="num">
            <br><br>
        </div>
        <div class="p-0.2 m-1">
            <b>Password :</b>
            <input type="password" name="email" class="border ml-4" placeholder="abcde@123" id="mail" >
            <i class="fa-solid fa-eye"></i>
            <br><br>
        </div>
        <div class="p-0.2 m-1">
            <b>Gender :</b>
            <input type="radio" name="gender" class="border" id="male" value="male">Male
            <input type="radio" name="gender" class="border" id="female" value="female">Female
            <input type="radio" name="gender" class="border" id="Other" value="Other">Other
            <br><br>
        </div>
        <div class="p-0.2 m-1">
            <b>Department :</b>
            <select name="" id="" class="border">
                <option value="CSE" >CSE</option>
                        <option value="CSE-DS">CSE-DS</option>
                        <option value="AIML">AIML</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Information Tech">Information Tech</option>
                        <option value="AIDS">AIDS</option>
            </select>
            <br><br>
        </div>
        <div class="p-0.2 m-1">
            <b>Semester :</b>
                <select name="" id="" class="border">
                    <option value="">I</option>
                    <option value="">II</option>
                    <option value="">III</option>
                    <option value="">IV</option>
                    <option value="">V</option>
                    <option value="">VI</option>
                    <option value="">VII</option>
                    <option value="">VII</option>
                    
                </select>
            <br><br>
        </div>
        <div class="grid place-content-center">
            <button class="bg-blue-500 hover:bg-blue-800 hover:text-white px-14 py-1 mb-3 rounded-tl-xl rounded-br-xl">
                
                Submit
            </button>
            
        </div>
        

        </div>
        

    </form>

</body>

</html>
