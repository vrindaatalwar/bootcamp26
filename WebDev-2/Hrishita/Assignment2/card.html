<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Card</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
    <div class="top">
        <span class="basic"><i>BASIC </i></span>
        <span class="Mimi">Mimikyu</span>
        <span class="hp">HP</span>
        <span class="h">70 &#9734;</span>
    </div>
    <div class="image">
        <img src="https://w0.peakpx.com/wallpaper/522/981/HD-wallpaper-mimikyu-cute-ghost-ghost-pokemon-mimic-mimick-mimick-you-mimiku-pokemon-purple.jpg"
            alt="Mimikyu"
            width="365" height="250">
    </div>
    <div class="Ability">
        <span class="ability"><i>Ability</i></span>
        <span class="heal">Heal Jamming</span>
        <p>Your opponent's Benched Pokémon can't be healed.</p>
    </div>
    <div class="attack">
        <span class="sym">&#8859;&#10026;</span>
        <span clas="claw">Claw Slash</span>
        <span>30</span>
    </div>
    <div class="stats">
        <span>weakness  &#10686;x2</span>
        <span>resistance    &#10050;-30</span>
        <span>retreat &#10026;</span>

    </div>
</div>
</body>
</html>
